<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瞬译 - FlashTrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app" id="app">
    <section class="lang-bar">
      <div class="lang-group">
        <label class="lang-label">源语言：</label>
        <div class="select-wrapper">
          <select id="source-lang" class="lang-select">
            <option value="auto">自动检测</option>
            <option value="zh">中文</option>
            <option value="en">英文</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
            <option value="pt">葡萄牙语</option>
            <option value="it">意大利语</option>
            <option value="ar">阿拉伯语</option>
            <option value="th">泰语</option>
            <option value="vi">越南语</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <button class="btn-swap" id="btn-swap" title="交换语言">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10.3536 1.64645C10.1583 1.45118 9.84171 1.45118 9.64645 1.64645C9.45118 1.84171 9.45118 2.15829 9.64645 2.35355L11.2929 4H3.5C3.22386 4 3 4.22386 3 4.5C3 4.77614 3.22386 5 3.5 5H11.2929L9.64645 6.64645C9.45118 6.84171 9.45118 7.15829 9.64645 7.35355C9.84171 7.54882 10.1583 7.54882 10.3536 7.35355L12.8536 4.85355C13.0488 4.65829 13.0488 4.34171 12.8536 4.14645L10.3536 1.64645Z" fill="currentColor"/>
          <path d="M6.35355 9.35355C6.54882 9.15829 6.54882 8.84171 6.35355 8.64645C6.15829 8.45118 5.84171 8.45118 5.64645 8.64645L3.14645 11.1464C2.95118 11.3417 2.95118 11.6583 3.14645 11.8536L5.64645 14.3536C5.84171 14.5488 6.15829 14.5488 6.35355 14.3536C6.54882 14.1583 6.54882 13.8417 6.35355 13.6464L4.70711 12H12.5C12.7761 12 13 11.7761 13 11.5C13 11.2239 12.7761 11 12.5 11H4.70711L6.35355 9.35355Z" fill="currentColor"/>
        </svg>
      </button>

      <div class="lang-group">
        <label class="lang-label">目标语言：</label>
        <div class="select-wrapper">
          <select id="target-lang" class="lang-select">
            <option value="zh" selected>中文</option>
            <option value="en">英文</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
            <option value="pt">葡萄牙语</option>
            <option value="it">意大利语</option>
            <option value="ar">阿拉伯语</option>
            <option value="th">泰语</option>
            <option value="vi">越南语</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="lang-bar-right">
        <button class="btn-icon" id="btn-settings" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </section>

    <main class="translator">
      <div class="pane">
        <div class="pane-header">
          <span class="pane-label" id="source-lang-label">中文</span>
          <span class="pane-actions">
            <button class="btn-micro" id="btn-paste" title="粘贴并翻译">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
              </svg>
            </button>
            <button class="btn-micro" id="btn-clear" title="清空">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </span>
        </div>
        <textarea
          id="source-text"
          class="text-area"
          placeholder="输入或粘贴要翻译的文本…"
          rows="5"
        ></textarea>
      </div>

      <div class="pane pane-result">
        <div class="pane-header">
          <span class="pane-label" id="target-lang-label">英文</span>
          <span class="pane-actions">
            <button class="btn-micro" id="btn-copy" title="复制译文">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </span>
        </div>
        <div id="result-text" class="result-area">
          <span class="placeholder-hint">译文将在此显示…</span>
        </div>
      </div>
    </main>

    <footer class="footer">
      <button class="btn-translate" id="btn-translate">
        <span id="btn-translate-text">翻译</span>
      </button>
    </footer>

    <div class="overlay" id="settings-overlay">
      <div class="settings-panel">
        <div class="settings-header">
          <h2>设置</h2>
          <button class="btn-icon" id="btn-close-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="settings-body">
          <label class="settings-label">
            <span>GLM API Key</span>
            <input
              type="password"
              id="api-key-input"
              class="settings-input"
              placeholder="请输入您的 API Key"
              autocomplete="off"
            />
          </label>
          <p class="settings-hint">
            API Key 将安全保存在本地<br>
            获取地址：<a href="#" id="link-api" target="_blank">智谱 BigModel 开放平台</a>
          </p>

          <label class="settings-label settings-toggle-row">
            <span>实时翻译</span>
            <div class="toggle-wrapper">
              <input type="checkbox" id="auto-translate-toggle" class="toggle-input" />
              <span class="toggle-track" id="auto-translate-track">
                <span class="toggle-thumb"></span>
              </span>
            </div>
          </label>
          <p class="settings-hint">开启后，输入文本时自动翻译（无需点击按钮）</p>
          <p style="text-align: center;" class="settings-hint"> 作者：<a href="#" id="link-author" target="_blank">大沄</a></p>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    const sourceLangMap = {
      auto: '自动检测', zh: '中文', en: '英文', ja: '日语',
      ko: '韩语', fr: '法语', de: '德语', es: '西班牙语',
      ru: '俄语', pt: '葡萄牙语', it: '意大利语',
      ar: '阿拉伯语', th: '泰语', vi: '越南语',
    };
    const targetLangMap = {
      zh: '中文', en: '英文', ja: '日语', ko: '韩语',
      fr: '法语', de: '德语', es: '西班牙语', ru: '俄语',
      pt: '葡萄牙语', it: '意大利语', ar: '阿拉伯语',
      th: '泰语', vi: '越南语',
    };

    const $ = (id) => document.getElementById(id);
    const $$ = (selector) => document.querySelectorAll(selector);

    const sourceLangEl = $('source-lang');
    const targetLangEl = $('target-lang');
    const sourceTextEl = $('source-text');
    const resultEl = $('result-text');
    const btnTranslateEl = $('btn-translate');
    const btnTranslateTextEl = $('btn-translate-text');
    const btnSwapEl = $('btn-swap');
    const btnClearEl = $('btn-clear');
    const btnPasteEl = $('btn-paste');
    const btnCopyEl = $('btn-copy');
    const btnSettingsEl = $('btn-settings');
    const btnCloseSettingsEl = $('btn-close-settings');
    const settingsOverlayEl = $('settings-overlay');
    const apiKeyInputEl = $('api-key-input');
    const toastEl = $('toast');
    const linkApiEl = $('link-api');
    const linkAuthorEl = $('link-author');
    const autoTranslateToggle = $('auto-translate-toggle');
    const autoTranslateTrack = $('auto-translate-track');

    linkApiEl.addEventListener('click', (e) => {
      e.preventDefault();
      utools.shellOpenExternal('https://open.bigmodel.cn/');
    });

    linkAuthorEl.addEventListener('click', (e) => {
      e.preventDefault();
      utools.shellOpenExternal('https://space.bilibili.com/192702710');
    });

    const LANG_LABELS = { ...sourceLangMap, ...targetLangMap };

    function updateLangLabels() {
      $('source-lang-label').textContent = LANG_LABELS[sourceLangEl.value] || sourceLangEl.value;
      $('target-lang-label').textContent = LANG_LABELS[targetLangEl.value] || targetLangEl.value;
    }
    sourceLangEl.addEventListener('change', updateLangLabels);
    targetLangEl.addEventListener('change', updateLangLabels);
    updateLangLabels();

    btnSwapEl.addEventListener('click', () => {
      if (sourceLangEl.value === 'auto') return;
      const sVal = sourceLangEl.value;
      const tVal = targetLangEl.value;
      sourceLangEl.value = tVal;
      targetLangEl.value = sVal;
      const srcText = sourceTextEl.value;
      const resText = resultEl.dataset.content || '';
      sourceTextEl.value = resText;
      resultEl.dataset.content = srcText;
      resultEl.innerHTML = srcText
        ? `<span class="placeholder-hint">${resText || '译文将在此显示…'}</span>`
        : '<span class="placeholder-hint">译文将在此显示…</span>';
      if (resultEl.dataset.content) resultEl.textContent = resultEl.dataset.content;
      updateLangLabels();
    });

    btnClearEl.addEventListener('click', () => {
      sourceTextEl.value = '';
      resultEl.innerHTML = '<span class="placeholder-hint">译文将在此显示…</span>';
      delete resultEl.dataset.content;
      sourceTextEl.focus();
    });

    btnPasteEl.addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        const plainText = text.trim();
        if (!plainText) {
          showToast('剪贴板为空，请手动粘贴');
          return;
        }
        sourceTextEl.value = plainText;
        sourceTextEl.focus();
        doTranslate({ auto: false });
      } catch {
        showToast('无法访问剪贴板，请手动粘贴');
      }
    });

    let currentAbort = null;
    let autoTranslateTimer = null;
    const AUTO_TRANSLATE_DELAY = 800;

    function triggerAutoTranslate() {
      clearTimeout(autoTranslateTimer);
      if (!autoTranslateToggle.checked) return;
      autoTranslateTimer = setTimeout(() => doTranslate({ auto: true }), AUTO_TRANSLATE_DELAY);
    }

    async function doTranslate({ auto = false, pasteResult = false } = {}) {
      const text = sourceTextEl.value.trim();
      if (!text) {
        if (auto) {
          resultEl.innerHTML = '<span class="placeholder-hint">译文将在此显示…</span>';
          delete resultEl.dataset.content;
        }
        return;
      }
      const apiKey = localStorage.getItem('ft_api_key');
      if (!apiKey) {
        settingsOverlayEl.classList.add('active');
        showToast('请先设置 API Key');
        return;
      }
      if (currentAbort) { currentAbort.abort(); currentAbort = null; }
      const controller = new AbortController();
      currentAbort = controller;

      resultEl.innerHTML = '<span class="streaming-cursor"></span>';
      btnTranslateEl.disabled = true;
      btnTranslateTextEl.textContent = '翻译中…';

      const targetLang = LANG_LABELS[targetLangEl.value] || targetLangEl.value;

      try {
        const fullText = [];
        const result = await window.pluginApi.translateStream({
          apiKey,
          model: 'glm-4-flash-250414',
          targetLang, sourceText: text,
          onChunk: (chunk) => {
            const cursor = resultEl.querySelector('.streaming-cursor');
            if (cursor) cursor.remove();
            fullText.push(chunk);
            resultEl.textContent = fullText.join('');
            resultEl.appendChild(Object.assign(document.createElement('span'), { className: 'streaming-cursor' }));
          },
          signal: controller.signal,
        });
        const translatedText = fullText.join('');
        if (!translatedText) {
          resultEl.innerHTML = `<span class="error-text">未获得翻译结果，请检查 API Key 是否有效</span>`;
          showToast('翻译失败');
        } else {
          delete resultEl.dataset.content;
          resultEl.textContent = translatedText;

          if (pasteResult) {
            utools.hideMainWindowPasteText(translatedText);
          }

          showToast('翻译完成');
        }
      } catch (err) {
        if (err.message !== '请求已取消') {
          resultEl.innerHTML = `<span class="error-text">翻译失败：${err.message}</span>`;
          showToast('翻译失败');
        }
      } finally {
        btnTranslateEl.disabled = false;
        btnTranslateTextEl.textContent = '翻译';
        currentAbort = null;
      }
    }

    btnTranslateEl.addEventListener('click', () => doTranslate({ auto: false }));

    sourceTextEl.addEventListener('input', () => triggerAutoTranslate());

    sourceTextEl.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        doTranslate({ auto: false });
      }
    });

    btnCopyEl.addEventListener('click', () => {
      const text = resultEl.textContent;
      if (!text || resultEl.querySelector('.error-text') || resultEl.querySelector('.placeholder-hint')) {
        showToast('没有可复制的内容');
        return;
      }
      navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板')).catch(() => showToast('复制失败'));
    });

    btnSettingsEl.addEventListener('click', () => settingsOverlayEl.classList.add('active'));
    btnCloseSettingsEl.addEventListener('click', () => settingsOverlayEl.classList.remove('active'));
    settingsOverlayEl.addEventListener('click', (e) => {
      if (e.target === settingsOverlayEl) settingsOverlayEl.classList.remove('active');
    });

    apiKeyInputEl.addEventListener('blur', () => {
      const val = apiKeyInputEl.value.trim();
      if (val) {
        localStorage.setItem('ft_api_key', val);
      }
    });
    autoTranslateToggle.addEventListener('change', () => {
      localStorage.setItem('ft_auto_translate', autoTranslateToggle.checked ? '1' : '0');
      autoTranslateTrack.classList.toggle('on', autoTranslateToggle.checked);
      if (autoTranslateToggle.checked) {
        triggerAutoTranslate();
      } else {
        clearTimeout(autoTranslateTimer);
      }
    });

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastEl._timer);
      toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    const savedKey = localStorage.getItem('ft_api_key');
    if (savedKey) apiKeyInputEl.value = savedKey;

    const savedAutoTranslate = localStorage.getItem('ft_auto_translate');
    if (savedAutoTranslate === '1') {
      autoTranslateToggle.checked = true;
      autoTranslateTrack.classList.add('on');
    }

    utools.onPluginEnter(({ code, payload }) => {
      if (code !== 'trans-over') return;
      const text = typeof payload === 'string' ? payload.trim() : '';
      const EXCLUDED_TEXTS = ['瞬译', 'FlashTrans', '翻译', 'fy'];
      if (!text || EXCLUDED_TEXTS.includes(text)) return;
      sourceTextEl.value = text;
      doTranslate({ auto: false });
    });
  </script>
</body>
</html>
